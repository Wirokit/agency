<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <title>Wirokit - CV Tool</title>
    <link
      rel="stylesheet"
      href="{{url_for('static',filename='dist/tailwind.css')}}"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @media print {
        nav,
        nav * {
          display: none !important;
        }
        section {
          margin-top: 0 !important;
          padding: 0 !important;
        }
      }
      @layer base {
        dialog {
          margin: auto;
        }
      }
      body {
        &:where(.dark, .dark *) {
          background-image: url("{{url_for('static',filename='images/bg.jpg')}}");
        }
      }
      .w-bg {
        position: fixed;
        top: 20%;
        left: -10%;
        width: 50%;
        z-index: -100;
      }
      section {
        padding: 2rem 0;
      }
      .base-height {
        min-height: calc(100vh - 60px);
      }
      button.disabled,
      button.loading {
        background-color: rgba(0, 0, 0, 0.1);
        pointer-events: none;
      }
    </style>
  </head>
  <body
    class="font-sans antialiased dark:text-white"
    onscroll="handleScroll(event)"
  >
    <img class="w-bg" src="{{url_for('static',filename='images/w-bg.png')}}" />
    {% import "macros.html" as ui %}

    <nav id="top-nav" class="bg-inherit fixed w-full z-20 top-0 start-0">
      <div
        class="max-w-screen-xl h-[60px] flex flex-wrap items-center justify-between mx-auto p-2 px-4"
      >
        <a href="/" class="flex gap-4 items-center">
          <img
            src="/static/images/wirokit_icon_b.png"
            class="w-10 dark:hidden"
            alt="Wirokit Logo"
          />
          <img
            src="/static/images/wirokit_icon_w.png"
            class="w-10 hidden dark:block"
            alt="Wirokit Logo"
          />
          <span
            class="self-center text-xl text-heading font-semibold whitespace-nowrap"
          >
            CV Tool
          </span>
        </a>
        <div>
          <button
            id="profile-icon"
            type="button"
            class="flex items-center justify-center text-center w-[35px] h-[35px] bg-gray-300 dark:bg-[#C323B0] rounded-[90px] hover:cursor-pointer"
            onclick="toggleMenu(event)"
          >
            {{session['user_id'][0]}}
          </button>
        </div>

        <div
          id="user-menu"
          class="hidden absolute top-[55px] right-[10px] w-[250px] rounded-xl bg-white py-2 border border-default dark:bg-[#4a4e8d]"
        >
          <div id="menu-content">
            <div class="text-center italic mb-2">ADMIN</div>
            <div class="flex items-center px-4 gap-2 mb-3">
              <span
                id="menu-profile-icon"
                class="flex items-center justify-center text-center w-[40px] h-[40px] bg-gray-300 dark:bg-[#C323B0] rounded-[90px]"
              >
                {{session['user_id'][0]}}
              </span>
              <span id="logged-in-user">{{session['user_id']}}</span>
            </div>

            <hr class="border-gray-300" />

            <button
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 hover:bg-[#ffffff30] justify-between"
              onclick="toggleThemeSelector(event)"
            >
              <div class="flex items-center gap-3">
                <i data-lucide="sun"></i>
                Theme: Light
              </div>
              <i data-lucide="chevron-right"></i>
            </button>
            <button
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 hover:bg-[#ffffff30]"
              onclick="logOut(event)"
            >
              <i data-lucide="log-in"></i>
              Log out
            </button>
          </div>

          <div id="theme-selector" class="hidden">
            <button
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 font-medium"
              onclick="toggleThemeSelector(event)"
            >
              <i data-lucide="arrow-left"></i>
              Theme
            </button>

            <hr class="border-gray-300" />

            <button
              id="btn-theme-default"
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 hover:bg-[#ffffff30]"
              onclick="changeTheme(event, 'system')"
            >
              <i data-lucide="check" class="invisible"></i>
              Device default (Dark)
            </button>

            <button
              id="btn-theme-dark"
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 hover:bg-[#ffffff30]"
              onclick="changeTheme(event, 'dark')"
            >
              <i data-lucide="check" class="invisible"></i>
              Dark theme
            </button>

            <button
              id="btn-theme-light"
              type="button"
              class="flex items-center py-3 px-4 w-full text-start gap-3 hover:bg-[#ffffff30]"
              onclick="changeTheme(event, 'light')"
            >
              <i data-lucide="check" class="invisible"></i>
              Light theme
            </button>
          </div>
        </div>
      </div>
    </nav>
    <section class="base-height flex justify-center p-0 mt-[60px]">
      <header>{% block header %}{% endblock %}</header>
      {% for message in get_flashed_messages() %}
      <div class="flash">{{ message }}</div>
      {% endfor %} {% block content %}{% endblock %}
    </section>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script>
      // Initialize Icons
      lucide.createIcons();

      document.documentElement.classList.toggle(
        "dark",
        localStorage.theme === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches),
      );

      document
        .getElementById(
          `btn-theme-${!("theme" in localStorage) ? "default" : localStorage.theme}`,
        )
        .getElementsByClassName("invisible")[0]
        .classList.remove("invisible");

      const nav = document.getElementById("top-nav");
      const menu = document.getElementById("user-menu");

      // Menu content
      const menuDefaultContent = document.getElementById("menu-content");
      const menuThemeSelector = document.getElementById("theme-selector");

      function handleScroll(event) {
        if (window.scrollY > 5) {
          nav.classList.add("dark:bg-black");
        } else {
          nav.classList.remove("dark:bg-black");
        }
      }

      function toggleMenu(e) {
        e.preventDefault();

        if (menu.classList.contains("hidden")) {
          menu.classList.remove("hidden");
        } else {
          menu.classList.add("hidden");

          // Close theme menu if it was open
          menuThemeSelector.classList.add("hidden");
          menuDefaultContent.classList.remove("hidden");
        }
      }

      function toggleThemeSelector(e) {
        e.preventDefault();

        if (menuThemeSelector.classList.contains("hidden")) {
          menuDefaultContent.classList.add("hidden");
          menuThemeSelector.classList.remove("hidden");
        } else {
          menuThemeSelector.classList.add("hidden");
          menuDefaultContent.classList.remove("hidden");
        }
      }

      function changeTheme(e, mode) {
        e.preventDefault();

        if (
          localStorage.theme == "mode" ||
          (!localStorage.theme && mode == "system")
        ) {
          return;
        }

        if (mode == "system") {
          localStorage.removeItem("theme");
        } else if (mode == "light") {
          localStorage.theme = "light";
        } else if (mode == "dark") {
          localStorage.theme = "dark";
        }

        window.location.reload();
      }

      // If menu is open, close the menu when user clicks somewhere else
      window.addEventListener("mouseup", (e) => {
        if (!menu.classList.contains("hidden") && !menu.contains(e.target)) {
          toggleMenu(e);
        }
      });

      async function logOut(e) {
        e.preventDefault();

        try {
          const response = await fetch("/api/logout", {
            method: "POST",
          });
          const result = await response.json();

          if (result.success) {
            window.location.href = "/";
          }
        } catch (e) {
          console.error("Logout error:", e);
        }
      }
    </script>
  </body>
</html>
