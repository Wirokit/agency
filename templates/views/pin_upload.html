<!doctype html>
{% import "macros.html" as ui %}{% extends 'base.html' %}

<!-- Main Container -->
{% block content %}
<style>
  /* 2. Add custom styling for the file input */
  .card {
    box-shadow:
      0 0 20px 0 rgb(0 0 0 / 0.1),
      0 0 20px 0 rgb(0 0 0 / 0.1);
  }
  .primary-color {
    color: #3b82f6;
  }
  .warn-border {
    border-color: rgb(220, 53, 69);
  }
</style>

<!-- Card -->
<div class="bg-white w-full max-w-md rounded-xl card">
  <div class="card-content p-8 space-y-4">
    <div id="upload-content">
      <!-- Header -->
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Upload PDF</h1>
        <p class="text-gray-500 mt-2">Turn a PDF CV into a new Wirokit CV</p>
      </div>

      <form id="upload-form" class="space-y-6">
        <!-- File Input Area -->
        {{ ui.pdf_upload() }}

        <!-- Submit Button -->
        <button
          type="submit"
          id="submit-button"
          class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition duration-200"
        >
          Upload and Process
        </button>
      </form>
    </div>

    <!-- Result Area (for loading, success, or error) -->
    <div id="result-container" class="text-center hidden pt-2">
      <!-- Loading Spinner -->
      <div id="loading-spinner" class="hidden">
        <svg
          class="animate-spin h-8 w-8 text-blue-600 mx-auto"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <p class="text-gray-500 mt-2">Processing your file, please wait...</p>
      </div>

      <!-- Result Message -->
      <div id="result-message"></div>
    </div>
  </div>
</div>

<!-- 5. JavaScript Logic -->
<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
<script>
  // Initialize Icons
  lucide.createIcons();

  const uploadForm = document.getElementById("upload-form");
  const resultContainer = document.getElementById("result-container");
  const loadingSpinner = document.getElementById("loading-spinner");
  const resultMessage = document.getElementById("result-message");
  const submitButton = document.getElementById("submit-button");

  // Handle form submission
  uploadForm.addEventListener("submit", async (e) => {
    e.preventDefault(); // Prevent default form submission

    const formData = new FormData(uploadForm);
    const formObject = Object.fromEntries(formData);

    const file = formObject["file"];
    if (!file || file["name"] == "") {
      displayMessage("Please select a PDF file to upload.", "error");
      return;
    }

    hideMessage();

    submitButton.textContent = "Uploading...";
    setLoading(true);

    const firstNameOnly = formObject["firstNameOnly"] === "on";
    formData.set("firstNameOnly", firstNameOnly);

    try {
      // Post the file to the backend's /cv endpoint
      const response = await fetch("/api/cv", {
        method: "POST",
        body: formData,
      });

      const result = await response.json();

      if (response.ok && result.success && result.url) {
        // Success! Display the new URL
        const successHtml = `
              <p class="text-green-700 font-medium">File processed successfully!</p>
              <p class="text-gray-600 mt-2">Your new link is ready:</p>
              <a href="${result.url}" target="_blank" class="block bg-gray-100 text-blue-600 font-mono break-words p-3 rounded-md mt-2 hover:bg-gray-200">
                ${result.url}
              </a>
            `;
        displayMessage(successHtml, "success");
      } else {
        // Handle backend error
        displayMessage(
          result.error || "An unknown error occurred on the server.",
          "error",
        );
      }
    } catch (error) {
      // Handle network or fetch error
      console.error("Upload Error:", error);
      displayMessage(
        "Failed to connect to the server. Please try again.",
        "error",
      );
    } finally {
      submitButton.textContent = "Upload and Process";
      setLoading(false);
    }
  });

  // Helper function to display messages
  function displayMessage(message, type) {
    resultContainer.classList.remove("hidden");

    if (type === "error") {
      resultMessage.innerHTML = `<p class="text-red-600 font-medium">${message}</p>`;
    } else {
      resultMessage.innerHTML = message; // Assumes HTML for success
    }
  }

  function setLoading(loading) {
    submitButton.disabled = loading;

    if (loading) {
      submitButton.classList.add("disabled");
      loadingSpinner.classList.remove("hidden");
      resultContainer.classList.remove("hidden");
    } else {
      submitButton.classList.remove("disabled");
      loadingSpinner.classList.add("hidden");
    }
  }

  function hideMessage() {
    resultContainer.classList.add("hidden");
    resultMessage.innerHTML = "";
  }
</script>
{% endblock %}
