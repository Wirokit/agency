<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <title>Wirokit - CV Bank</title>
    <link
      rel="stylesheet"
      href="{{url_for('static',filename='dist/tailwind.css')}}"
    />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom styles -->
    <style>
      body {
        &:where(.dark, .dark *) {
          background-image: url("{{url_for('static',filename='images/bg.jpg')}}");
          background-repeat: no-repeat;
          background-size: 100% auto;
        }
      }
      .card {
        box-shadow:
          0 0 20px 0 rgb(0 0 0 / 0.1),
          0 0 20px 0 rgb(0 0 0 / 0.1);
      }
    </style>
  </head>
  <body
    class="bg-slate-100 flex items-center justify-center min-h-screen dark:text-(--color-white)"
  >
    {% import "macros.html" as ui %}

    <div class="w-full max-w-sm p-6">
      <!-- Card Container -->
      <div
        class="relative card px-8 py-6 bg-(--bg-paper) rounded-2xl overflow-hidden"
      >
        <button class="absolute top-1 right-1" onclick="toggleTheme(event)">
          <div class="hidden dark:block p-2 rounded-full text-yellow-500">
            <i data-lucide="sun" class="w-6 h-6"></i>
          </div>
          <div class="dark:hidden p-2 rounded-full text-blue-500">
            <i data-lucide="moon" class="w-6 h-6"></i>
          </div>
        </button>

        <!-- Header -->
        <div class="flex flex-col items-center">
          <img
            src="/static/images/wirokit_icon_b.png"
            class="dark:hidden w-10 mb-3"
            alt="Wirokit Logo"
          />
          <img
            src="/static/images/wirokit_icon_w.png"
            class="hidden dark:block w-10 mb-3"
            alt="Wirokit Logo"
          />
          <h1 class="text-xl font-bold">Agency</h1>
          <p id="instructions" class="text-sm mt-1 opacity-[0.8]">
            Please enter your PIN to continue
          </p>
        </div>

        <!-- Login Form -->
        <div class="pt-4">
          <form id="pinForm" class="space-y-6">
            {{ ui.pin_input() }}

            <div
              id="pinError"
              class="hidden px-3 text-red-400 text-xs flex items-center gap-2"
            >
              <i data-lucide="alert-circle" class="w-4 h-4"></i>
              <span id="pinErrorMessage">asd</span>
            </div>

            <button
              type="submit"
              class="w-full mt-2 bg-(--color-primary) hover:bg-(--color-primary-hover) text-white font-semibold py-3 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex justify-center items-center gap-2"
            >
              <span>Confirm</span>
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
          </form>

          <form id="loginForm" class="space-y-4 hidden">
            <div class="relative">
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Username"
                class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none pl-10"
                required
              />
              <div class="absolute left-3 top-3.5 text-slate-400">
                <i data-lucide="user" class="w-5 h-5"></i>
              </div>
            </div>

            <div class="relative">
              <input
                type="password"
                id="password"
                name="password"
                class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none pl-10"
                placeholder="Password"
                required
              />
              <div class="absolute left-3 top-3.5 text-slate-400">
                <i data-lucide="key" class="w-5 h-5"></i>
              </div>
            </div>

            <div
              id="loginError"
              class="hidden px-3 text-red-400 text-xs flex items-center gap-2"
            >
              <i data-lucide="alert-circle" class="w-4 h-4"></i>
              <span id="loginErrorMessage"></span>
            </div>

            <button
              type="submit"
              class="w-full bg-(--color-primary) hover:bg-(--color-primary-hover) text-white font-semibold py-3 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex justify-center items-center gap-2"
            >
              <span>Sign In</span>
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
          </form>

          <div class="w-full text-center mt-4">
            <a
              id="method-toggle"
              href="#"
              class="text-sm font-medium text-fg-brand underline hover:no-underline"
            >
              Login via username instead
            </a>
          </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center">
          <p class="text-xs opacity-[0.6]">Wirokit &copy; 2026</p>
        </div>
      </div>
    </div>

    <script>
      // Initialize Icons
      lucide.createIcons();

      const prefersDarkMode = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      document.documentElement.classList.toggle(
        "dark",
        localStorage.theme === "dark" ||
          (!("theme" in localStorage) && prefersDarkMode),
      );

      const loginForm = document.getElementById("loginForm");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginError = document.getElementById("loginError");
      const loginSubmitBtn = loginForm.querySelector("button");
      const loginSubmitContent = loginSubmitBtn.innerHTML;

      const pinForm = document.getElementById("pinForm");
      const pinError = document.getElementById("pinError");
      const pinSubmitBtn = pinForm.querySelector("button");
      const pinButtonContent = pinSubmitBtn.innerHTML;

      const instructionsField = document.getElementById("instructions");
      const methodToggle = document.getElementById("method-toggle");

      function toggleTheme(e) {
        e.preventDefault();

        switch (localStorage.theme) {
          case "dark":
            localStorage.theme = "light";
            break;
          case "light":
            localStorage.theme = "dark";
            break;
          default:
            localStorage.theme = prefersDarkMode ? "dark" : "light";
        }

        window.location.reload();
      }

      methodToggle.addEventListener("click", (e) => {
        e.preventDefault();

        if (loginForm.classList.contains("hidden")) {
          loginForm.classList.remove("hidden");
          pinForm.classList.add("hidden");
          instructionsField.innerText =
            "Please enter your credentials to continue";
          methodToggle.innerText = "Enter a PIN code instead";
        } else {
          loginForm.classList.add("hidden");
          pinForm.classList.remove("hidden");
          instructionsField.innerText = "Please enter your PIN to continue";
          methodToggle.innerText = "Login via username instead";
        }
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Reset state
        loginError.classList.add("hidden");
        passwordInput.classList.remove(
          "border-red-500",
          "focus:ring-red-500",
          "focus:border-red-500",
        );

        const username = usernameInput.value;
        const enteredPassword = passwordInput.value;

        setLoading(true);

        const formData = new FormData();
        formData.append("user", username);
        formData.append("password", enteredPassword);

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (result.success) {
            // Success State
            passwordInput.classList.add(
              "border-green-500",
              "focus:ring-green-500",
              "focus:border-green-500",
            );
            loginSubmitBtn.innerHTML = `<span class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4"></i> Verified</span>`;
            lucide.createIcons();
            window.location.reload();
          } else {
            displayError("Incorrect Username or Password.", "error");

            // Error State
            loginError.classList.remove("hidden");
            passwordInput.classList.add(
              "border-red-500",
              "focus:ring-red-500",
              "focus:border-red-500",
            );

            // Reset button
            loginSubmitBtn.disabled = false;
            loginSubmitBtn.innerHTML = loginSubmitContent;

            // Shake animation effect
            loginForm.classList.add("animate-[shake_0.5s_ease-in-out]");
            setTimeout(
              () =>
                loginForm.classList.remove("animate-[shake_0.5s_ease-in-out]"),
              500,
            );
          }
        } catch (error) {
          // Handle network or fetch error
          console.error("Login Error:", error);
          displayError(
            "Failed to connect to the server. Please try again.",
            "error",
          );
        } finally {
          // --- End Loading State ---
          loginSubmitBtn.disabled = false;
          loginSubmitBtn.innerHTML = loginSubmitContent;
          lucide.createIcons();
          // ---
        }
      });

      pinForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideMessage();

        const pinArray = [
          document.getElementById("pin-1").value,
          document.getElementById("pin-2").value,
          document.getElementById("pin-3").value,
          document.getElementById("pin-4").value,
          document.getElementById("pin-5").value,
          document.getElementById("pin-6").value,
        ];
        const pin = pinArray.join("");

        setLoading(true);

        const formData = new FormData();
        formData.append("pin", pin);
        try {
          const response = await fetch("/api/pin-login", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();
          if (result.success) {
            window.location.reload();
          } else {
            if (result.error == "Invalid PIN.") {
              displayError("Invalid or expired PIN. Please try again.");
            } else {
              displayError(result.error);
            }
            setLoading(false);
          }
        } catch (error) {
          // Handle network or fetch error
          console.error("PIN Login Error:", error);
          displayError("Failed to connect to the server. Please try again.");
          setLoading(false);
        }
      });

      function displayError(message) {
        if (loginForm.classList.contains("hidden")) {
          // Pin form message
          document.getElementById("pinErrorMessage").innerText = message;
          pinError.classList.remove("hidden");
        } else {
          // Login form message
          document.getElementById("loginErrorMessage").innerText = message;
          loginError.classList.remove("hidden");
        }
      }

      function hideMessage() {
        pinError.classList.add("hidden");
        loginError.classList.add("hidden");
      }

      function setLoading(loading) {
        if (loading) {
          if (loginForm.classList.contains("hidden")) {
            pinSubmitBtn.disabled = true;
            pinSubmitBtn.innerHTML = `<span class="animate-spin mr-2"><i data-lucide="loader-2" class="w-5 h-5"></i></span> Verifying...`;
          } else {
            loginSubmitBtn.disabled = true;
            loginSubmitBtn.innerHTML = `<span class="animate-spin mr-2"><i data-lucide="loader-2" class="w-5 h-5"></i></span> Verifying...`;
          }
          methodToggle.disabled = true;
          lucide.createIcons();
        } else {
          pinSubmitBtn.disabled = false;
          pinSubmitBtn.innerHTML = pinButtonContent;
          loginSubmitBtn.disabled = false;
          loginSubmitBtn.innerHTML = loginSubmitContent;
          methodToggle.disabled = false;
          lucide.createIcons();
        }
      }

      // Add shake animation to Tailwind config via style tag since we are using CDN
      const style = document.createElement("style");
      style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
