<!doctype html>
{% extends 'base.html' %}

<!-- Block start -->
{% block content %}
<style>
  .card {
    box-shadow:
      0 0 20px 0 rgb(0 0 0 / 0.1),
      0 0 20px 0 rgb(0 0 0 / 0.1);
  }
  .message.error {
    border-color: rgb(239 68 68);
    color: rgb(220 38 38);
  }
  .message.success {
    border-color: rgb(21 128 61);
    color: rgb(21 128 61);
  }
</style>

<meta id="forced" data-other="{{forced}}" />

<div class="w-full flex items-center max-w-xs mt-[-60px]">
  <div
    class="card w-full px-8 py-6 bg-white rounded-2xl overflow-hidden border border-slate-200"
  >
    <!-- Header -->
    <div
      class="bg-slate-50 border-b border-slate-100 flex flex-col items-center mb-4"
    >
      <div class="bg-blue-100 p-3 rounded-full mb-3 text-blue-600">
        <i data-lucide="lock" class="w-6 h-6"></i>
      </div>
      <h1 class="text-xl font-bold text-slate-800">Update password</h1>
      {% if forced %}
      <p class="text-slate-500 text-sm mt-1 text-center">
        You are required to change your password to continue.
      </p>
      {% endif %}
    </div>

    <form id="update_pw_form" class="space-y-4">
      <div>
        <label for="old_password">
          <span class="text-red-500">*</span> Current password
        </label>
        <input
          type="password"
          id="old_password"
          name="old_password"
          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
          required
        />
      </div>

      <div>
        <label for="new_password">
          <span class="text-red-500">*</span> New password
          <span class="text-sm">(12-64 characters)</span>
        </label>
        <input
          type="password"
          id="new_password"
          name="new_password"
          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
          required
        />
      </div>

      <div>
        <label for="repeat_password">
          <span class="text-red-500">*</span> Repeat password
        </label>
        <input
          type="password"
          id="repeat_password"
          name="repeat_password"
          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
          required
        />
      </div>

      <div
        id="message_container"
        class="message hidden p-3 border text-sm rounded-lg flex items-center gap-2"
      >
        <i id="message_icon" data-lucide="alert-circle" class="w-10"></i>
        <span id="message_text">Testing</span>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 flex justify-center items-center gap-2"
      >
        <span>Confirm</span>
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </form>
  </div>
</div>

<script>
  // Initialize Icons
  lucide.createIcons();

  const form = document.getElementById("update_pw_form");
  const messageContainer = document.getElementById("message_container");
  const messageIcon = document.getElementById("message_icon");
  const messageText = document.getElementById("message_text");
  const forcedChange =
    document.getElementById("forced").getAttribute("data-other") == "True";

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    hideMessage();

    const formData = new FormData(form);
    const formObj = Object.fromEntries(formData.entries());

    // Ensure new password meets the length requirements
    if (formObj["new_password"].length < 12) {
      displayMessage(
        "New password needs to be at least 12 characters long.",
        "error",
      );
      return;
    } else if (formObj["new_password"].length > 64) {
      displayMessage(
        "New password can't be more than 64 characters long.",
        "error",
      );
      return;
    }

    // Check that new passwords match
    if (formObj["new_password"] !== formObj["repeat_password"]) {
      displayMessage("New password and repeat password do not match.", "error");
      return;
    }

    try {
      const response = await fetch("/api/password", {
        method: "UPDATE",
        body: formData,
      });

      const result = await response.json();
      if (response.ok && result.success) {
        displayMessage("Password changed successfully!", "success");
        if (forcedChange) {
          window.location.reload();
        }
      } else {
        displayMessage(`Error changing password: ${result.error}`, "error");
      }
    } catch (e) {
      console.error(e);
    }
  });

  function displayMessage(message, type) {
    messageContainer.classList.remove("error", "success");
    messageText.innerText = message;
    if (type == "error") {
      messageContainer.classList.add("error");
      messageIcon.setAttribute("data-lucide", "alert-circle");
    } else if (type == "success") {
      messageContainer.classList.add("success");
      messageIcon.setAttribute("data-lucide", "check");
    } else {
      messageIcon.setAttribute("data-lucide", "info");
    }
    lucide.createIcons();
    messageContainer.classList.remove("hidden");
  }

  function hideMessage() {
    messageContainer.classList.add("hidden");
  }
</script>

<!-- Block end -->
{% endblock %}
